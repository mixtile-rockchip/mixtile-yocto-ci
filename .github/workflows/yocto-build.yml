name: Mixtile Yocto Full Build

on:
  workflow_dispatch:
    inputs:
      machine:
        description: "Yocto MACHINE to build"
        required: true
        default: "mixtile-core3588e"
        type: string

permissions:
  contents: write
  actions: read

env:
  MANIFEST_URL: https://github.com/mixtile-rockchip/manifests.git
  MANIFEST_BRANCH: rk3588-linux-6.1-rkr6
  MANIFEST_FILE: rk3588_linux6.1_release.xml

jobs:
  full-build:
    name: Full Build (${{ github.event.inputs.machine }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential chrpath socat cpio \
            python3 python3-pip python3-pexpect xz-utils debianutils iputils-ping \
            python3-git python3-jinja2 libsdl1.2-dev zstd liblz4-tool file locales libacl1 repo

      - name: Init and sync Yocto repos
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/work"
          cd "$GITHUB_WORKSPACE/work"
          repo init -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH" -m "$MANIFEST_FILE"
          repo sync -c -j8 --no-tags --no-clone-bundle \
            yocto/meta-browser yocto/meta-clang yocto/meta-openembedded \
            yocto/meta-lts-mixins yocto/meta-rockchip yocto/meta-mixtile yocto/poky yocto/build/conf

      - name: Build core-image-minimal
        shell: bash
        env:
          MACHINE_INPUT: ${{ github.event.inputs.machine }}
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/work/yocto"
          set +u
          source oe-init-build-env build
          set -u

          grep -q 'meta-mixtile' conf/bblayers.conf || \
            echo 'BBLAYERS += "${TOPDIR}/../meta-mixtile"' >> conf/bblayers.conf

          grep -q '^MACHINE[[:space:]]*=' conf/local.conf \
            && sed -i "s/^MACHINE[[:space:]]*=.*/MACHINE = \"${MACHINE_INPUT}\"/" conf/local.conf \
            || echo "MACHINE = \"${MACHINE_INPUT}\"" >> conf/local.conf

          grep -q '^INHERIT:append[[:space:]]*=.*rockchip-image' conf/local.conf \
            || echo 'INHERIT:append = " rockchip-image"' >> conf/local.conf

          # Workaround for Ubuntu GitHub runner userns restrictions
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sh -c 'echo 0 > /proc/sys/kernel/apparmor_restrict_unprivileged_userns' || true
          fi
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ] && \
             [ "$(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)" = "1" ]; then
            sed -i 's/bb.utils.disable_network(uid, gid)/pass  # disabled on GitHub runner/' poky/bitbake/bin/bitbake-worker
          fi

          bitbake core-image-minimal

      - name: Collect artifacts
        id: prep_release
        shell: bash
        env:
          MACHINE_INPUT: ${{ github.event.inputs.machine }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euxo pipefail
          DEPLOY="$GITHUB_WORKSPACE/work/yocto/build/tmp/deploy/images/${MACHINE_INPUT}"
          RELEASE_DIR="$GITHUB_WORKSPACE/release-assets"
          RELEASE_DATE="$(date -u +%Y%m%d)"
          mkdir -p "$RELEASE_DIR"
          ls -lah "$DEPLOY"

          WIC_LINK="$DEPLOY/core-image-minimal-${MACHINE_INPUT}.rootfs.wic"
          UPDATE_LINK="$DEPLOY/update.img"

          [ -e "$WIC_LINK" ]
          [ -e "$UPDATE_LINK" ]

          WIC_REAL="$(readlink -f "$WIC_LINK" || realpath "$WIC_LINK")"
          UPDATE_REAL="$(readlink -f "$UPDATE_LINK" || realpath "$UPDATE_LINK")"
          WIC_NAME="$(basename "$WIC_REAL")"
          UPDATE_NAME="$(basename "$UPDATE_REAL")"
          TAG_NAME="${MACHINE_INPUT}-${RELEASE_DATE}"
          RELEASE_TITLE="Mixtile ${MACHINE_INPUT} Yocto Image ${RELEASE_DATE}"

          cp -f "$WIC_REAL" "$RELEASE_DIR/$WIC_NAME"
          cp -f "$UPDATE_REAL" "$RELEASE_DIR/$UPDATE_NAME"

          (
            cd "$RELEASE_DIR"
            sha256sum "$WIC_NAME" "$UPDATE_NAME" > checksums.txt
          )

          cat > "$RELEASE_DIR/release-notes.md" <<EOF
          # Mixtile ${MACHINE_INPUT} Yocto Image Release

          This release is generated automatically from a successful GitHub Actions build.

          - Workflow: \`${{ github.workflow }}\`
          - Machine: \`${MACHINE_INPUT}\`
          - Source branch: \`${{ github.ref_name }}\`
          - Source commit: \`${HEAD_SHA}\`
          - Run URL: ${RUN_URL}
          - Built image: \`core-image-minimal\`

          Assets:

          - \`${WIC_NAME}\`
          - \`${UPDATE_NAME}\`
          - \`checksums.txt\`
          EOF

          ls -lah "$RELEASE_DIR"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "wic_name=${WIC_NAME}" >> "$GITHUB_OUTPUT"
          echo "update_name=${UPDATE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.prep_release.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.prep_release.outputs.release_title }}
          RELEASE_DIR: ${{ steps.prep_release.outputs.release_dir }}
          WIC_NAME: ${{ steps.prep_release.outputs.wic_name }}
          UPDATE_NAME: ${{ steps.prep_release.outputs.update_name }}
        shell: bash
        run: |
          set -euxo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "$RELEASE_DIR/$WIC_NAME" \
              "$RELEASE_DIR/$UPDATE_NAME" \
              "$RELEASE_DIR/checksums.txt" \
              --clobber
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_DIR/release-notes.md" \
              --latest
          else
            gh release create "$TAG_NAME" \
              "$RELEASE_DIR/$WIC_NAME" \
              "$RELEASE_DIR/$UPDATE_NAME" \
              "$RELEASE_DIR/checksums.txt" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_DIR/release-notes.md" \
              --target "${{ github.sha }}" \
              --latest
          fi
